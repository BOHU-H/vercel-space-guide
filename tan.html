<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="description" content="3D沉浸式全景体验 - Robot与Star的奇幻世界">
    <title>3D沉浸式全景体验</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background-color: #050510;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        #webgl-container {
            width: 100vw;
            height: 100vh;
            display: block;
            position: relative;
        }
        
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #050510 0%, #0a0a20 100%);
            color: #00ffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }
        
        #loading-screen.hidden {
            opacity: 0;
            visibility: hidden;
        }
        
        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(0, 255, 255, 0.15);
            border-top: 4px solid #00ffff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 25px;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        #progress-text {
            font-size: 1.3rem;
            letter-spacing: 3px;
            font-weight: 300;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 1; }
        }
        
        .error-message {
            color: #ff6b6b;
            font-size: 1.1rem;
            margin-top: 20px;
            padding: 15px 25px;
            background: rgba(255, 107, 107, 0.1);
            border-radius: 8px;
            border: 1px solid rgba(255, 107, 107, 0.3);
            display: none;
            max-width: 80%;
            text-align: center;
        }
        
        .error-message.visible {
            display: block;
        }
    </style>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="loading-screen">
        <div class="spinner"></div>
        <div id="progress-text">加载中... 0%</div>
        <div id="error-message" class="error-message"></div>
    </div>

    <div id="webgl-container"></div>

    <script type="module">
        import './tan.js';
        
        window.addEventListener('error', function(event) {
            const errorDiv = document.getElementById('error-message');
            const progressText = document.getElementById('progress-text');
            const spinner = document.querySelector('.spinner');
            
            if (errorDiv && progressText) {
                errorDiv.textContent = '加载出错: ' + event.message + ' (请确保使用了本地服务器 Live Server 运行)';
                errorDiv.classList.add('visible');
                progressText.textContent = '加载失败';
                if(spinner) spinner.style.display = 'none';
            }
            
            console.error('页面错误:', event.error);
        });
        
        window.addEventListener('unhandledrejection', function(event) {
            const errorDiv = document.getElementById('error-message');
            const progressText = document.getElementById('progress-text');
            const spinner = document.querySelector('.spinner');
            
            if (errorDiv && progressText) {
                errorDiv.textContent = '异步错误: ' + event.reason;
                errorDiv.classList.add('visible');
                progressText.textContent = '加载失败';
                if(spinner) spinner.style.display = 'none';
            }
            
            console.error('未处理的Promise拒绝:', event.reason);
        });
        
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('/sw.js').catch(function(err) {
                    console.log('Service Worker注册失败:', err);
                });
            });
        }
    </script>
</body>
</html>
